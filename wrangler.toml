name = "iptvx"
main = "worker/index.js"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "IPTV_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "iptvx-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
ENVIRONMENT = "production"
# 管理后台 API Key（生产环境请使用 wrangler secret put ADMIN_API_KEY）
ADMIN_API_KEY = "iptvx-admin-dev-key"
