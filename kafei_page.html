  <script>
    window.addEventListener('error', function (e) {
      if (e.target && e.target.tagName === 'SCRIPT') {
        const src = e.target.src || '';
        const isLocalAsset = src.indexOf(window.location.origin) === 0 || (src.indexOf('http') !== 0 && src.indexOf('/') === 0);
        const isAppAsset = isLocalAsset && src.indexOf('/assets/') !== -1;

        if (isAppAsset) {
          try {
            const now = Date.now();
            const lastReload = parseInt(sessionStorage.getItem('last_script_error_reload') || '0', 10);
            const reloadCount = parseInt(sessionStorage.getItem('script_error_reload_count') || '0', 10);

            // 物理防死循环熔断：15秒内已刷过，或累计刷满3次，则立即拦截刷新
            if (now - lastReload < 15000 || reloadCount >= 3) {
              console.error('Local script load failed permanently. Reload blocked by safety fuse to prevent infinite loop. Asset:', src);
              return;
            }

            sessionStorage.setItem('last_script_error_reload', now.toString());
            sessionStorage.setItem('script_error_reload_count', (reloadCount + 1).toString());
            console.warn('Local asset chunk load failed, forcing reload once to fetch latest code:', src);
            window.location.reload(true);
          } catch (err) {
            console.error('Script error handler exception:', err);
          }
        } else {
          // 彻底忽略第三方脚本（如 Google Analytics, 百度统计等被广告拦截插件拦截导致加载失败）
          console.log('Ignored non-critical third-party script load failure:', src);
        }
      }
    }, true);

    const CURRENT_VERSION = '2.0.0'; // 更新版本号强制触发清理
    if (localStorage.getItem('app_version') !== CURRENT_VERSION) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let reg of regs) {
            reg.unregister().then(() => console.log('SW Unregistered'));
          }
          if (window.caches) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
              console.log('Caches Cleared');
              localStorage.setItem('app_version', CURRENT_VERSION);
              setTimeout(() => window.location.reload(true), 500);
            });
          } else {
            localStorage.setItem('app_version', CURRENT_VERSION);
            window.location.reload(true);
          }
        });
      } else {
        localStorage.setItem('app_version', CURRENT_VERSION);
        if (window.caches) {
          caches.keys().then(names => {
            for (let name of names) caches.delete(name);
            window.location.reload(true);
          });
        }
      }
    }

    (function () {
      function syncDomainConfig() {
        const config = window.SITE_CONFIG;
        if (!config) return;

        if (config.title) document.title = config.title;

        if (config.favicon) {
          const faviconUrl = config.favicon + (config.favicon.includes('?') ? '&' : '?') + 'v=' + Date.now();

          ['icon', 'shortcut icon'].forEach(rel => {
            let link = document.querySelector(`link[rel="${rel}"]`);
            if (!link) {
              link = document.createElement('link');
              link.rel = rel;
              document.head.appendChild(link);
            }
            link.href = faviconUrl;
          });
        }

        if (config.keywords) {
          const k = document.querySelector('meta[name="keywords"]');
          if (k) k.content = config.keywords;
        }
        if (config.description) {
          const d = document.querySelector('meta[name="description"]');
          if (d) d.content = config.description;
        }
      }

      function syncGA() {
        const config = window.SITE_CONFIG;
        if (config && config.gaId && !window.GA_INITIALIZED) {
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=' + config.gaId;
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag() { dataLayer.push(arguments); }
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', config.gaId);
          window.GA_INITIALIZED = true;
          console.log("[GA] Initialized with ID:", config.gaId);
        }
      }

      function syncMatomo() {
        const config = window.SITE_CONFIG;
        if (config && config.matomoUrl && config.matomoId && !window.MATOMO_INITIALIZED) {
          window._paq = window._paq || [];
          window._paq.push(['trackPageView']);
          window._paq.push(['enableLinkTracking']);
          (function () {
            var u = config.matomoUrl;
            if (u.lastIndexOf('/') !== u.length - 1) {
              u += '/';
            }
            window._paq.push(['setTrackerUrl', u + 'matomo.php']);
            window._paq.push(['setSiteId', config.matomoId.toString()]);

            var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0];
            g.async = true; g.src = u + 'matomo.js'; s.parentNode.insertBefore(g, s);
          })();
          window.MATOMO_INITIALIZED = true;
          console.log("[Matomo] Initialized with Tracker URL:", config.matomoUrl, "Site ID:", config.matomoId);
        }
      }

      syncDomainConfig();
      syncGA();
      syncMatomo();
      window.addEventListener('DOMContentLoaded', () => {
        syncDomainConfig();
        syncGA();
        syncMatomo();
      });
    })();
  </script>

<body>
  <div id="app">
    <style>
      .app-initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0d0e12;
        display: none !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .loading-logo-box {
        position: relative;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loading-spinner {
        width: 56px;
        height: 56px;
        border: 3px solid rgba(244, 63, 94, 0.1);
        border-top-color: #f43f5e;
        border-radius: 50%;
        animation: app-spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
      }

      .loading-pulse {
        position: absolute;
        width: 36px;
        height: 36px;
        background: radial-gradient(circle, rgba(244, 63, 94, 0.2) 0%, rgba(244, 63, 94, 0) 70%);
        border-radius: 50%;
        animation: app-pulse 1.8s ease-in-out infinite;
      }

      .loading-text {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 1px;
        animation: app-text-fade 1.5s ease-in-out infinite alternate;
      }

      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-pulse {

        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.5;
        }

        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      @keyframes app-text-fade {
        from {
          opacity: 0.5;
        }

        to {
          opacity: 1;
        }
      }
    </style>
    <div class="app-initial-loading">
      <div class="loading-logo-box">
        <div class="loading-spinner"></div>
        <div class="loading-pulse"></div>
      </div>
      <div class="loading-text">加载中...</div>
    </div>
  </div>
